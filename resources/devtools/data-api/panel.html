<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DataApi</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header class="toolbar">
      <input id="filter" type="search" placeholder="Filter method, path, status, error" />
      <label><input id="capturePayloads" type="checkbox" checked /> Payloads</label>
      <button id="clear" type="button">Clear</button>
      <span id="count" class="count">0 requests</span>
    </header>
    <main class="layout">
      <section class="list">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>State</th>
              <th>Method</th>
              <th>Path</th>
              <th>Status</th>
              <th>Client</th>
              <th>Main</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
      <aside class="details">
        <pre id="details">Select a DataApi event.</pre>
      </aside>
    </main>
    <script src="panel.js"></script>
  </body>
</html>
